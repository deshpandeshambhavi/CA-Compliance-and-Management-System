{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h5 class="mb-4">Assign Service to Client</h5>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Client</label>
          <select name="client_id" class="form-select" required>
            <option value="">-- Select Client --</option>
            {% for c in clients %}
            <option value="{{ c.Client_ID }}">{{ c.Name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Service</label>
          <select name="service_id" class="form-select" required>
            <option value="">-- Select Service --</option>
            {% for s in services %}
            <option value="{{ s.Service_ID }}">{{ s.Service_Name }} — ₹{{ s.Fees }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Usage Date</label>
          <input type="date" name="usage_date" class="form-control" required>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Assign</button>
          <a href="{{ url_for('services') }}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
