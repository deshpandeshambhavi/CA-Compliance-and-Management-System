{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h5 class="mb-4">Add Compliance Record</h5>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Client</label>
          <select name="client_id" class="form-select" required>
            <option value="">-- Select Client --</option>
            {% for c in clients %}
            <option value="{{ c.Client_ID }}">{{ c.Name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Compliance Type</label>
          <input type="text" name="type" class="form-control"
                 placeholder="e.g. ITR Filing FY2024-25" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Regulation</label>
          <select name="reg_id" class="form-select" required>
            <option value="">-- Select Regulation --</option>
            {% for r in regs %}
            <option value="{{ r.Reg_ID }}">{{ r.Name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Due Date</label>
          <input type="date" name="due_date" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Initial Status</label>
          <select name="status" class="form-select">
            <option value="Pending">Pending</option>
            <option value="Completed">Completed</option>
            <option value="Overdue">Overdue</option>
          </select>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Add Record</button>
          <a href="{{ url_for('compliance') }}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
