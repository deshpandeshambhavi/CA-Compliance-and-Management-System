{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4>Compliance</h4>
  <a href="{{ url_for('add_compliance') }}" class="btn btn-primary btn-sm">
    <i class="bi bi-plus"></i> Add Record
  </a>
</div>

<div class="card">
  <table class="table table-hover mb-0">
    <thead class="table-light">
      <tr><th>Client</th><th>Type</th><th>Regulation</th><th>Due Date</th><th>Status</th><th>Update</th></tr>
    </thead>
    <tbody>
      {% for co in compliance %}
      <tr>
        <td>{{ co.Client_Name }}</td>
        <td>{{ co.Type }}</td>
        <td>{{ co.Reg_Name }}</td>
        <td>{{ co.Due_Date }}</td>
        <td><span class="badge badge-{{ co.Status.lower() }}">{{ co.Status }}</span></td>
        <td>
          <form method="POST" action="{{ url_for('update_compliance', compliance_id=co.Compliance_ID) }}"
                class="d-flex gap-1">
            <select name="status" class="form-select form-select-sm" style="width:120px">
              <option value="Pending"   {{ 'selected' if co.Status=='Pending' }}>Pending</option>
              <option value="Completed" {{ 'selected' if co.Status=='Completed' }}>Completed</option>
              <option value="Overdue"   {{ 'selected' if co.Status=='Overdue' }}>Overdue</option>
            </select>
            <button class="btn btn-sm btn-outline-primary">Save</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="6" class="text-center text-muted">No compliance records.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
