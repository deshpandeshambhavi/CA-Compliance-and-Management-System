{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4>Clients</h4>
  <a href="{{ url_for('add_client') }}" class="btn btn-primary btn-sm">
    <i class="bi bi-plus"></i> Add Client
  </a>
</div>

<div class="card">
  <table class="table table-hover mb-0">
    <thead class="table-light">
      <tr><th>#</th><th>Name</th><th>PAN</th><th>Phone</th><th>Email</th><th>Actions</th></tr>
    </thead>
    <tbody>
      {% for c in clients %}
      <tr>
        <td>{{ c.Client_ID }}</td>
        <td>{{ c.Name }}</td>
        <td><code>{{ c.PAN }}</code></td>
        <td>{{ c.Phone }}</td>
        <td>{{ c.Email }}</td>
        <td>
          <a href="{{ url_for('client_report', client_id=c.Client_ID) }}"
             class="btn btn-outline-primary btn-sm">
            <i class="bi bi-eye"></i> View
          </a>
          <form action="{{ url_for('generate_bill', client_id=c.Client_ID) }}"
                method="POST" style="display:inline">
            <button class="btn btn-outline-success btn-sm">
              <i class="bi bi-receipt"></i> Generate Bill
            </button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="6" class="text-center text-muted">No clients found.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
