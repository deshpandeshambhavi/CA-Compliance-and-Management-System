<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CA Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }
    .sidebar {
      min-height: 100vh; background: #1a2238;
      width: 220px; position: fixed; top: 0; left: 0;
      padding-top: 20px; z-index: 100;
    }
    .sidebar .brand {
      color: #fff; font-weight: 700; font-size: 1.1rem;
      padding: 10px 20px 20px; border-bottom: 1px solid #2d3a55;
    }
    .sidebar .brand span { color: #4f8ef7; }
    .sidebar a {
      display: block; color: #a0aec0; padding: 10px 20px;
      text-decoration: none; font-size: 0.9rem; transition: all 0.2s;
    }
    .sidebar a:hover, .sidebar a.active {
      color: #fff; background: #2d3a55; border-left: 3px solid #4f8ef7;
    }
    .sidebar a i { margin-right: 8px; }
    .main-content { margin-left: 220px; padding: 30px; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .stat-card { border-radius: 12px; color: #fff; padding: 20px; }
    .badge-pending  { background: #fef3c7; color: #92400e; }
    .badge-completed{ background: #d1fae5; color: #065f46; }
    .badge-overdue  { background: #fee2e2; color: #991b1b; }
    .badge-paid     { background: #d1fae5; color: #065f46; }
    .badge-unpaid   { background: #fef3c7; color: #92400e; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="brand">CA <span>Manager</span></div>
  <a href="{{ url_for('index') }}"      class="{{ 'active' if request.endpoint=='index' }}">
    <i class="bi bi-speedometer2"></i> Dashboard</a>
  <a href="{{ url_for('clients') }}"    class="{{ 'active' if 'client' in request.endpoint }}">
    <i class="bi bi-people"></i> Clients</a>
  <a href="{{ url_for('services') }}"   class="{{ 'active' if 'service' in request.endpoint }}">
    <i class="bi bi-briefcase"></i> Services</a>
  <a href="{{ url_for('billing') }}"    class="{{ 'active' if 'bill' in request.endpoint }}">
    <i class="bi bi-receipt"></i> Billing</a>
  <a href="{{ url_for('compliance') }}" class="{{ 'active' if 'compliance' in request.endpoint }}">
    <i class="bi bi-shield-check"></i> Compliance</a>
  <a href="{{ url_for('reports') }}"    class="{{ 'active' if request.endpoint=='reports' }}">
    <i class="bi bi-bar-chart"></i> Reports</a>
</div>

<div class="main-content">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show">
        {{ msg }} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
